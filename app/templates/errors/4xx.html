{% extends "base.html" %}
{% block title %}{{ status_code }} — LFA Education Center{% endblock %}

{% block content %}
<style>
.err-page {
    min-height: 70vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
.err-card {
    background: white;
    border-radius: 16px;
    padding: 3rem 3.5rem;
    max-width: 520px;
    width: 100%;
    text-align: center;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    border-top: 5px solid #e53e3e;
}
.err-code {
    font-size: 5rem;
    font-weight: 800;
    color: #e53e3e;
    line-height: 1;
    margin-bottom: 0.5rem;
}
.err-title {
    font-size: 1.5rem;
    font-weight: 700;
    color: #2d3748;
    margin-bottom: 0.75rem;
}
.err-msg {
    color: #718096;
    font-size: 1rem;
    line-height: 1.6;
    margin-bottom: 2rem;
}
.err-actions { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
.err-btn {
    padding: 0.65rem 1.5rem;
    border-radius: 8px;
    font-size: 0.95rem;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.2s;
    display: inline-block;
}
.err-btn-primary { background: #4299e1; color: white; }
.err-btn-primary:hover { background: #3182ce; transform: translateY(-1px); }
.err-btn-ghost { background: #edf2f7; color: #4a5568; }
.err-btn-ghost:hover { background: #e2e8f0; }
.err-request-id { font-size: 0.72rem; color: #a0aec0; margin-top: 2rem; font-family: monospace; }
</style>

<div class="err-page">
    <div class="err-card">
        <div class="err-code">{{ status_code }}</div>
        <div class="err-title">{{ title }}</div>
        <p class="err-msg">{{ message }}</p>
        <div class="err-actions">
            <a href="javascript:history.back()" class="err-btn err-btn-ghost">← Back</a>
            <a href="/dashboard" class="err-btn err-btn-primary">🏠 Go to Dashboard</a>
        </div>
        {% if request_id %}
        <div class="err-request-id">Request ID: {{ request_id }}</div>
        {% endif %}
    </div>
</div>
{% endblock %}
