name: Cypress E2E Tests

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Manual trigger

concurrency:
  group: ci-cypress-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        spec:
          - cypress/e2e/auth/login.cy.js
          - cypress/e2e/auth/registration.cy.js
          - cypress/e2e/error_states/http_409_conflict.cy.js
          - cypress/e2e/error_states/unauthorized.cy.js
          - cypress/e2e/student/booking_lifecycle.cy.js
          - cypress/e2e/student/license_advancement.cy.js
          - cypress/e2e/student/booking_capacity_concurrency.cy.js

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_DB: lfa_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt
          pip check

      - name: Write .env (consistent settings for all subprocesses)
        run: |
          cat > .env <<'EOF'
          DATABASE_URL=postgresql://postgres:postgres@localhost:5432/lfa_test
          SECRET_KEY=ci-test-secret-key-not-for-production
          ENVIRONMENT=test
          TESTING=true
          DEBUG=false
          ADMIN_EMAIL=admin@lfa.com
          ADMIN_PASSWORD=admin123
          ADMIN_NAME=CI Admin
          ENABLE_RATE_LIMITING=false
          EOF

      - name: Run Alembic migrations
        run: alembic upgrade head

      # ── E2E baseline: seed users + active semester ───────────────────────────
      # Baseline spec is documented in scripts/init_e2e_environment.py.
      # Update that file (and the Cypress env vars below) when baseline changes.
      - name: Initialize E2E baseline environment
        run: python scripts/init_e2e_environment.py

      - name: Start FastAPI backend
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          timeout 45 bash -c 'until curl -sf http://localhost:8000/health; do sleep 1; done'

      # ── Verify baseline is reachable via the live API ─────────────────────
      # Confirms that seeded credentials work and the CI semester is visible.
      # Fails fast before Cypress starts if the environment is broken.
      - name: Verify E2E baseline
        run: |
          TOKEN=$(curl -sf -X POST http://localhost:8000/api/v1/auth/login \
            -H 'Content-Type: application/json' \
            -d '{"email":"admin@lfa.com","password":"admin123"}' \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['access_token'])")
          echo "✓ admin login OK"

          SEM_TOTAL=$(curl -sf -H "Authorization: Bearer $TOKEN" \
            http://localhost:8000/api/v1/semesters/ \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['total'])")
          [ "$SEM_TOTAL" -ge 1 ] || { echo "✗ no semesters found"; exit 1; }
          echo "✓ semesters visible: $SEM_TOTAL"

      - name: Start Streamlit frontend
        run: |
          streamlit run "streamlit_app/🏠_Home.py" --server.port 8501 --server.headless true &
          timeout 60 bash -c 'until curl -sf http://localhost:8501/_stcore/health; do sleep 2; done'

      - name: Install Cypress dependencies
        working-directory: cypress
        run: npm ci

      - name: Sanitize spec name for artifact
        id: spec
        run: |
          safe=$(echo '${{ matrix.spec }}' | tr '/' '-' | sed 's/\.cy\.js$//')
          echo "name=${safe}" >> "$GITHUB_OUTPUT"

      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: cypress
          spec: ${{ matrix.spec }}
          browser: chrome
          config: baseUrl=http://localhost:8501
        env:
          CYPRESS_adminEmail: admin@lfa.com
          CYPRESS_adminPassword: admin123
          CYPRESS_instructorEmail: grandmaster@lfa.com
          CYPRESS_instructorPassword: TestInstructor2026
          CYPRESS_playerEmail: rdias@manchestercity.com
          CYPRESS_playerPassword: TestPlayer2026

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots-${{ steps.spec.outputs.name }}
          path: cypress/cypress/screenshots
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload videos on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-videos-${{ steps.spec.outputs.name }}
          path: cypress/cypress/videos
          retention-days: 7
          if-no-files-found: ignore
