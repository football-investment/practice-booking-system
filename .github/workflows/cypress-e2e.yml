name: Cypress E2E

on:
  # ── PR gate: smoke suite only (fast, ~3 min) ─────────────────────────────
  pull_request:
    branches: [main, develop]
    paths:
      - 'streamlit_app/**'
      - 'app/**'
      - 'tests_cypress/**'

  # ── Nightly: full suite + error suite ────────────────────────────────────
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC every night

  # ── Manual trigger for all jobs ──────────────────────────────────────────
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite to run'
        required: false
        default: 'full'
        type: choice
        options: [full, smoke, errors]

# ─────────────────────────────────────────────────────────────────────────────
# Shared environment
# ─────────────────────────────────────────────────────────────────────────────
env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION:   '20'
  BACKEND_PORT:   8000
  STREAMLIT_PORT: 8501

# ─────────────────────────────────────────────────────────────────────────────
# Job 1 — PR smoke  (triggers on every PR)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  smoke:
    name: Smoke Suite (PR Gate)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.suite == 'smoke')
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER:     lfa
          POSTGRES_PASSWORD: lfa
          POSTGRES_DB:       lfa_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Write .env (consistent settings for all subprocesses)
        run: |
          cat > .env <<'EOF'
          DATABASE_URL=postgresql://lfa:lfa@localhost:5432/lfa_test
          SECRET_KEY=ci-test-secret-key-not-for-production
          ENVIRONMENT=test
          TESTING=true
          DEBUG=false
          ADMIN_EMAIL=admin@lfa.com
          ADMIN_PASSWORD=admin123
          ADMIN_NAME=CI Admin
          ENABLE_RATE_LIMITING=false
          EOF

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Seed test data
        run: python scripts/seed_e2e_users.py

      - name: Start FastAPI backend
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port ${{ env.BACKEND_PORT }} &
          timeout 45 bash -c 'until curl -sf http://localhost:${{ env.BACKEND_PORT }}/health; do sleep 1; done'

      - name: Start Streamlit app
        run: |
          BACKEND_URL=http://localhost:${{ env.BACKEND_PORT }} \
          streamlit run "streamlit_app/🏠_Home.py" \
            --server.port ${{ env.STREAMLIT_PORT }} \
            --server.headless true &
          timeout 60 bash -c 'until curl -sf http://localhost:${{ env.STREAMLIT_PORT }}/_stcore/health; do sleep 2; done'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: tests_cypress/package-lock.json

      - name: Install Cypress
        working-directory: tests_cypress
        run: npm ci

      - name: Run smoke suite
        working-directory: tests_cypress
        env:
          CYPRESS_BASE_URL:        http://localhost:${{ env.STREAMLIT_PORT }}
          CYPRESS_API_URL:         http://localhost:${{ env.BACKEND_PORT }}
          CYPRESS_STREAMLIT_URL:   http://localhost:${{ env.STREAMLIT_PORT }}
          CYPRESS_ADMIN_EMAIL:     admin@lfa.com
          CYPRESS_ADMIN_PASSWORD:  admin123
        run: npx cypress run --env grepTags=@smoke --browser chrome --headless

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-smoke-screenshots-${{ github.run_id }}
          path: tests_cypress/cypress/screenshots/
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# Job 2 — Critical specs (blocking for PR merge) — split A/B for parallelism
#
# Previously a single job running 15 specs serially (10m28s).
# Now two matrix groups running in parallel, targeting <6 min each.
#
# Group A (8 specs — admin/auth/new API workflows): ~4.5 min of tests
# Group B (7 specs — student/instructor/player UI):  ~5.0 min of tests
# Wall-clock improvement: 10m28s serial → ~6 min parallel (~43% faster)
# ─────────────────────────────────────────────────────────────────────────────
  critical:
    name: Critical Specs (${{ matrix.group }} — Blocking)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 15

    strategy:
      fail-fast: false   # run both groups even if one fails
      matrix:
        include:
          # ── Group A: admin + auth + new API-workflow specs ──────────────────
          # Specs: dashboard_navigation(31s), tournament_manager(40s),
          #        tournament_monitor(41s), registration(34s),
          #        tournament_applications(70s), booking_lifecycle(~30s),
          #        license_advancement(~30s), booking_capacity_concurrency(~30s)
          # Estimated test time: ~4.5 min
          - group: A
            specs: "cypress/e2e/admin/dashboard_navigation.cy.js,cypress/e2e/admin/tournament_manager.cy.js,cypress/e2e/admin/tournament_monitor.cy.js,cypress/e2e/auth/registration.cy.js,cypress/e2e/instructor/tournament_applications.cy.js,cypress/e2e/student/booking_lifecycle.cy.js,cypress/e2e/student/license_advancement.cy.js,cypress/e2e/student/booking_capacity_concurrency.cy.js"

          # ── Group B: student + instructor + player UI specs ─────────────────
          # Specs: instructor/dashboard(19s), student/credits(40s),
          #        student/dashboard(~30s), enrollment_flow(46s),
          #        skill_update(40s), player/credits(30s),
          #        player/specialization_hub(37s)
          # Estimated test time: ~5.0 min
          - group: B
            specs: "cypress/e2e/instructor/dashboard.cy.js,cypress/e2e/student/credits.cy.js,cypress/e2e/student/dashboard.cy.js,cypress/e2e/student/enrollment_flow.cy.js,cypress/e2e/student/skill_update.cy.js,cypress/e2e/player/credits.cy.js,cypress/e2e/player/specialization_hub.cy.js"

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER:     lfa
          POSTGRES_PASSWORD: lfa
          POSTGRES_DB:       lfa_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Write .env (consistent settings for all subprocesses)
        run: |
          cat > .env <<'EOF'
          DATABASE_URL=postgresql://lfa:lfa@localhost:5432/lfa_test
          SECRET_KEY=ci-test-secret-key-not-for-production
          ENVIRONMENT=test
          TESTING=true
          DEBUG=false
          ADMIN_EMAIL=admin@lfa.com
          ADMIN_PASSWORD=admin123
          ADMIN_NAME=CI Admin
          ENABLE_RATE_LIMITING=false
          EOF

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Seed test data
        run: python scripts/seed_e2e_users.py

      - name: Start FastAPI backend
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port ${{ env.BACKEND_PORT }} &
          timeout 45 bash -c 'until curl -sf http://localhost:${{ env.BACKEND_PORT }}/health; do sleep 1; done'

      - name: Start Streamlit app
        run: |
          BACKEND_URL=http://localhost:${{ env.BACKEND_PORT }} \
          streamlit run "streamlit_app/🏠_Home.py" \
            --server.port ${{ env.STREAMLIT_PORT }} \
            --server.headless true &
          timeout 60 bash -c 'until curl -sf http://localhost:${{ env.STREAMLIT_PORT }}/_stcore/health; do sleep 2; done'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: tests_cypress/package-lock.json

      - name: Install Cypress
        working-directory: tests_cypress
        run: npm ci

      - name: Run critical specs (group ${{ matrix.group }})
        working-directory: tests_cypress
        env:
          CYPRESS_BASE_URL:            http://localhost:${{ env.STREAMLIT_PORT }}
          CYPRESS_API_URL:             http://localhost:${{ env.BACKEND_PORT }}
          CYPRESS_STREAMLIT_URL:       http://localhost:${{ env.STREAMLIT_PORT }}
          CYPRESS_ADMIN_EMAIL:         admin@lfa.com
          CYPRESS_ADMIN_PASSWORD:      admin123
          CYPRESS_INSTRUCTOR_EMAIL:    grandmaster@lfa.com
          CYPRESS_INSTRUCTOR_PASSWORD: TestInstructor2026
          CYPRESS_PLAYER_EMAIL:        rdias@manchestercity.com
          CYPRESS_PLAYER_PASSWORD:     TestPlayer2026
        run: |
          npx cypress run \
            --spec '${{ matrix.specs }}' \
            --browser chrome \
            --headless

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-critical-screenshots-${{ matrix.group }}-${{ github.run_id }}
          path: tests_cypress/cypress/screenshots/
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# Job 3 — Full nightly suite (all specs, split critical/non-critical)
# ─────────────────────────────────────────────────────────────────────────────
  full:
    name: Full Suite (Nightly)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.suite == 'full')
    timeout-minutes: 60

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER:     lfa
          POSTGRES_PASSWORD: lfa
          POSTGRES_DB:       lfa_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Write .env (consistent settings for all subprocesses)
        run: |
          cat > .env <<'EOF'
          DATABASE_URL=postgresql://lfa:lfa@localhost:5432/lfa_test
          SECRET_KEY=ci-test-secret-key-not-for-production
          ENVIRONMENT=test
          TESTING=true
          DEBUG=false
          ADMIN_EMAIL=admin@lfa.com
          ADMIN_PASSWORD=admin123
          ADMIN_NAME=CI Admin
          ENABLE_RATE_LIMITING=false
          EOF

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Seed test data
        run: python scripts/seed_e2e_users.py

      - name: Start FastAPI backend
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port ${{ env.BACKEND_PORT }} &
          timeout 45 bash -c 'until curl -sf http://localhost:${{ env.BACKEND_PORT }}/health; do sleep 1; done'

      - name: Start Streamlit app
        run: |
          BACKEND_URL=http://localhost:${{ env.BACKEND_PORT }} \
          streamlit run "streamlit_app/🏠_Home.py" \
            --server.port ${{ env.STREAMLIT_PORT }} \
            --server.headless true &
          timeout 60 bash -c 'until curl -sf http://localhost:${{ env.STREAMLIT_PORT }}/_stcore/health; do sleep 2; done'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: tests_cypress/package-lock.json

      - name: Install Cypress
        working-directory: tests_cypress
        run: npm ci

      - name: Run full suite (all 202 tests)
        working-directory: tests_cypress
        continue-on-error: true
        env:
          CYPRESS_BASE_URL:           http://localhost:${{ env.STREAMLIT_PORT }}
          CYPRESS_API_URL:            http://localhost:${{ env.BACKEND_PORT }}
          CYPRESS_ADMIN_EMAIL:        admin@lfa.com
          CYPRESS_ADMIN_PASSWORD:      admin123
          CYPRESS_INSTRUCTOR_EMAIL:   grandmaster@lfa.com
          CYPRESS_INSTRUCTOR_PASSWORD: TestInstructor2026
          CYPRESS_PLAYER_EMAIL:        rdias@manchestercity.com
          CYPRESS_PLAYER_PASSWORD:    TestPlayer2026
        run: |
          npx cypress run \
            --browser chrome \
            --headless \
            --reporter json \
            --reporter-options "output=cypress-results.json"

      - name: Analyze results (critical vs non-critical)
        working-directory: tests_cypress
        run: node ci-result-processor.js all

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-full-screenshots-${{ github.run_id }}
          path: tests_cypress/cypress/screenshots/
          retention-days: 14

      - name: Upload videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-full-videos-${{ github.run_id }}
          path: tests_cypress/cypress/videos/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-results-${{ github.run_id }}
          path: tests_cypress/cypress-results.json
          retention-days: 30

# ─────────────────────────────────────────────────────────────────────────────
# Job 4 — Error-state suite (no live backend — all stubs via cy.intercept)
# Runs alongside the full suite on nightly, or standalone via workflow_dispatch
# ─────────────────────────────────────────────────────────────────────────────
  error-states:
    name: Non-Critical Specs (Error States — Warning Only)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.suite == 'errors')
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Start Streamlit (stub mode — no DB, no backend)
        env:
          # Point at a non-existent backend; all API calls will be intercepted
          BACKEND_URL:               http://localhost:9999
          STREAMLIT_SERVER_HEADLESS: true
        run: |
          streamlit run "streamlit_app/🏠_Home.py" \
            --server.port ${{ env.STREAMLIT_PORT }} \
            --server.headless true &
          timeout 60 bash -c 'until curl -sf http://localhost:${{ env.STREAMLIT_PORT }}/_stcore/health; do sleep 2; done'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: tests_cypress/package-lock.json

      - name: Install Cypress
        working-directory: tests_cypress
        run: npm ci

      - name: Run error-state specs
        working-directory: tests_cypress
        env:
          CYPRESS_BASE_URL:    http://localhost:${{ env.STREAMLIT_PORT }}
          CYPRESS_API_URL:     http://localhost:9999
          CYPRESS_SKIP_API_TESTS: 'true'
        run: npx cypress run --spec 'cypress/e2e/error_states/**' --browser chrome --headless

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-error-screenshots-${{ github.run_id }}
          path: tests_cypress/cypress/screenshots/
          retention-days: 7
