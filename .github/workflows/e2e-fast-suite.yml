name: E2E Fast Suite (Mandatory)

# CRITICAL: This workflow is MANDATORY for all PRs and pushes to main/develop
# Fast Suite = 52 Playwright tests (100% stable, production-ready baseline)
# Baseline tag: e2e-fast-suite-stable-v1

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ci-e2e-fast-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-suite:
    name: Fast Suite (tournament monitor baseline)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Write .env (consistent settings for all subprocesses)
        run: |
          cat > .env <<'EOF'
          DATABASE_URL=postgresql://postgres:postgres@localhost:5432/test_db
          SECRET_KEY=ci-test-secret-key-not-for-production
          ENVIRONMENT=test
          TESTING=true
          DEBUG=false
          ADMIN_EMAIL=admin@lfa.com
          ADMIN_PASSWORD=admin123
          ADMIN_NAME=CI Admin
          ENABLE_RATE_LIMITING=false
          EOF

      - name: Run Alembic migrations
        run: |
          alembic upgrade head
          alembic current -v

      - name: Start FastAPI backend
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          timeout 30 bash -c 'until curl -sf http://localhost:8000/health; do sleep 1; done'

      - name: Start Streamlit frontend
        env:
          BACKEND_URL: http://localhost:8000
        run: |
          streamlit run streamlit_app/Home.py --server.port 8501 --server.headless true &
          timeout 60 bash -c 'until curl -sf http://localhost:8501/_stcore/health; do sleep 2; done'

      - name: Run Fast Suite
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        run: |
          pytest tests_e2e/test_tournament_monitor_e2e.py \
                 tests_e2e/test_tournament_monitor_coverage.py \
                 tests_e2e/test_champion_badge_regression.py \
            -m "not scale_suite" \
            --tb=short \
            -ra \
            --maxfail=1 \
            -v

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-fast-suite-screenshots
          path: tests_e2e/screenshots/*_FAILED.png
          retention-days: 7

      - name: Upload failure snapshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-fast-suite-snapshots
          path: tests_e2e/snapshots/*.dump
          retention-days: 7

    # CRITICAL: Fast Suite is MANDATORY
    # No bypass, no skip, no optional flags
    # Failure = PR blocked
